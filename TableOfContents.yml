- Project:
    Number: "001"
    Title: Remove Duplicates
    Difficulty: Medium
    Description: | # use the "Bar" if you want multiline instructions
      Write a function that removes all duplicates from an unsorted list of email addresses, while leaving the remaining list in the original order.
      
      Prove that this function can handle 100,000 email addresses containing 50% randomly placed duplicates, in under 1 second on a typical laptop.

- Project:
    Number: "002"
    Title: Fizz Buzz
    Difficulty: Easy
    Description: |
      Write a function that when given a list:
        - if the number is divisible by 3, outputs the word "fizz"
        - if the number is divisible by 5, outputs the word "buzz"
        - if the number is divisible by both 3 and 5, outputs "fizz buzz"
        - if the number is not divisible by either 3 or 5, outputs the number

- Project:
    Number: "003"
    Title: Find the longest word
    Difficulty: Easy
    Description: |
      Given a paragraph, write a function to find the longest word in the paragraph.

      paragraph="Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Non blandit massa enim nec dui. Arcu felis bibendum ut tristique et. Vel turpis nunc eget lorem. Non nisi est sit amet facilisis magna. Sit amet consectetur adipiscing elit duis. Nulla pellentesque dignissim enim sit amet. Vitae et leo duis ut. Orci sagittis eu volutpat odio facilisis. Laoreet suspendisse interdum consectetur libero id faucibus nisl tincidunt. Dictum sit amet justo donec enim diam."

